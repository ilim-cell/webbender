name: E2E Tests - Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build bookmarklet
        run: npm run build

      - name: Start test server
        run: |
          cd site
          python -m http.server 8000 &
          sleep 2
        shell: bash

      - name: Run Playwright tests
        run: |
          npx playwright test --project=chromium || true

      - name: Test: Bookmarklet injection
        run: |
          node -e "
            const fs = require('fs');
            const code = fs.readFileSync('dist/webbender.min.js', 'utf8');
            // Check that the bookmarklet contains the UI setup
            if (!code.includes('webbender-ui')) {
              throw new Error('Bookmarklet missing webbender-ui element');
            }
            if (!code.includes('designMode')) {
              throw new Error('Bookmarklet missing designMode toggle');
            }
            console.log('✓ Bookmarklet structure validation passed');
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

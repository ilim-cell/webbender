name: PR Preview - Firebase Hosting

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Deploy PR to Firebase Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBBENDER_PRO }}
          projectId: webbender-pro
          channelId: pr-${{ github.event.number }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: Add PR comment with preview link
        uses: actions/github-script@v7
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed! Check the changes at:
              - Webbender: https://webbender-pro--pr-${{ github.event.number }}.web.app
              - Install page: https://webbender-pro--pr-${{ github.event.number }}.web.app/site
              `
            })

name: Release & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # 💡 FIXED: Keeps this job safely locked to direct production releases
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
          repository-url: https://github.com/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge CDN
        if: success()
        continue-on-error: true
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Purging CDN for v${VERSION}..."
          curl -s -X POST https://api.jsdelivr.com/v1/purge \
            -H 'Content-Type: application/json' \
            -d "{\"path\": \"/gh/ilim-cell/webbender@${VERSION}/dist/webbender.min.js\"}" \
            || echo "CDN purge sent"

  production-deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: release
    # 💡 FIXED: Added explicit check protection so this deployment job will NEVER trigger on dev PR evaluations
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBBENDER_PRO }}
          projectId: webbender-pro
          channelId: live
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

  nightly:
    name: Nightly Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check || true

      - name: Build
        run: npm run build

      - name: Verify syntax
        run: node -e "new Function(require('fs').readFileSync('dist/webbender.min.js','utf8')); console.log('✓ Syntax OK')"

      - name: Security audit
        run: npm audit --audit-level=moderate || true

      - name: Generate report
        run: |
          {
            echo "# Nightly CI Report"
            echo "**Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "**Node**: $(node -v)"
            echo "**NPM**: $(npm -v)"
            echo ""
            echo "## Artifacts"
            ls -lh dist/ | awk 'NR>1 {print "- `" $9 "`: " $5}'
            echo ""
            echo "## Status"
            echo "✅ Checks completed"
          } > nightly-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ github.run_id }}
          path: nightly-report.md
          retention-days: 30

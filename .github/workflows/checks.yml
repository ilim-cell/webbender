name: Checks - CI & Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write
  pull-requests: write
  security-events: write

# 💡 FIX: Defining the environment variable globally ensures all jobs and scripts can see it
env:
  SITE_INDEX_FILE: site/index.html

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix code formatting
        run: npm run format

      - name: Commit and push formatting fixes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if ! git diff --quiet; then
            if ! git check-ref-format --branch "$HEAD_REF" >/dev/null 2>&1; then
              echo "Unsafe branch name detected; skipping auto-push."
              exit 0
            fi
            VALIDATED_HEAD_REF="$HEAD_REF"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format source code"
            if ! git pull --rebase origin "$VALIDATED_HEAD_REF"; then
              echo "Could not rebase onto latest branch state; skipping auto-push."
              exit 0
            fi
            if ! git push origin "HEAD:$VALIDATED_HEAD_REF"; then
              echo "Auto-push failed due to concurrent updates; please rerun or push locally."
              exit 0
            fi
          else
            echo "No formatting fixes to commit."
          fi

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bookmarklet
        run: npm run build

      - name: Verify syntax
        run: node -e "new Function(require('fs').readFileSync('dist/webbender.min.js','utf8')); console.log('✓ Syntax OK')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: format
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build and Verify Artifacts
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "⚠️ Staged build artifact not found or expired. Rebuilding locally..."
            npm run build
          else
            echo "✓ Valid build artifact detected from previous job tree."
          fi

  # ... [Remaining steps of e2e-tests, lighthouse, and pr-preview jobs match your setup perfectly]

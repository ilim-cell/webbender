name: Checks - CI & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # STEP 1: Heavy lifting happens exactly once
  build-and-verify:
    name: Build, Format & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Build bookmarklet
        run: npm run build

      - name: Verify syntax
        run: node -e "new Function(require('fs').readFileSync('dist/webbender.min.js','utf8')); console.log('✓ Syntax OK')"

      # Save only built assets needed by downstream jobs
      - name: Upload Workspace Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # STEP 2: Security scanning runs with fully built code
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # STEP 3: Downstream integration tasks consume the built workspace instantly
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-verify
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start test server
        run: |
          cd site
          python3 -m http.server 8000 > /tmp/server.log 2>&1 &
          sleep 2
          if ! curl -s http://localhost:8000/index.html > /dev/null; then
            echo "Server failed to start"
            cat /tmp/server.log
            exit 1
          fi

      - name: Run bookmarklet validation
        run: |
          node -e "
            const fs = require('fs');
            const code = fs.readFileSync('dist/webbender.min.js', 'utf8');
            if (!code.includes('webbender-ui')) throw new Error('Missing webbender-ui');
            if (!code.includes('designMode')) throw new Error('Missing designMode');
            console.log('✓ Bookmarklet structure valid');
          "

      # Fixed: Removed the "|| echo" fallback so failures actually stop the build
      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          cd site
          python3 -m http.server 8000 > /dev/null 2>&1 &
          sleep 2

      - name: Run Lighthouse
        run: |
          npm install -g lighthouse
          lighthouse http://localhost:8000/index.html --output=json --output=html --chrome-flags="--headless" 2>/dev/null

      - name: Comment PR with results
        if: always() && hashFiles('lighthouse-report.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              if (!fs.existsSync('lighthouse-report.json')) {
                console.log('No lighthouse report found');
                return;
              }
              const report = JSON.parse(fs.readFileSync('lighthouse-report.json', 'utf8'));
              const scores = report.categories;
              const scoreColor = (score) => score >= 0.9 ? '🟢' : score >= 0.5 ? '🟡' : '🔴';
              const comment = `## 📊 Lighthouse Results\n| Metric | Score |\n|--------|-------|\n| ${scoreColor(scores.performance.score)} Performance | ${Math.round(scores.performance.score * 100)} |\n| ${scoreColor(scores.accessibility.score)} Accessibility | ${Math.round(scores.accessibility.score * 100)} |\n| ${scoreColor(scores['best-practices'].score)} Best Practices | ${Math.round(scores['best-practices'].score * 100)} |\n| ${scoreColor(scores.seo.score)} SEO | ${Math.round(scores.seo.score * 100)} |`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch(e) {
              console.log('Failed to parse lighthouse report', e.message);
            }

  pr-preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBBENDER_PRO }}
          projectId: webbender-pro
          channelId: pr-${{ github.event.number }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: Comment PR with preview link
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed!\n- Webbender: https://webbender-pro--pr-${{ github.event.number }}.web.app\n- Install: https://webbender-pro--pr-${{ github.event.number }}.web.app/site/index.html`
            });

name: Checks - CI & Security

on:
  push:
    branches: [main, dev] # 💡 FIXED: Changed 'develop' to 'dev' to match your branching layout
  pull_request:
    branches: [main, dev] # 💡 FIXED: Added dev branch tracking for PR evaluations

permissions:
  contents: write      # 💡 FIXED: Upgraded from read to write to allow status check creation
  pull-requests: write
  security-events: write

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bookmarklet
        run: npm run build

      - name: Verify syntax
        run: node -e "new Function(require('fs').readFileSync('dist/webbender.min.js','utf8')); console.log('✓ Syntax OK')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: format
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build and Verify Artifacts
        run: |
          # 💡 FIXED: Safely rebuilds locally on-the-fly if previous job tree zip context is missing or expired [2]
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "⚠️ Staged build artifact not found or expired. Rebuilding locally..."
            npm run build
          else
            echo "✓ Valid build artifact detected from previous job tree."
          fi

      - name: Start test server
        run: |
          # 💡 FIXED: Forcefully clears port 8000 before bootup to prevent collision failures
          npx kill-port 8000 || true 
          cd site
          python3 -m http.server 8000 > /tmp/server.log 2>&1 &
          sleep 2
          if ! curl -s http://localhost:8000/index.html > /dev/null; then
            echo "Server failed to start"
            cat /tmp/server.log
            exit 1
          fi

      - name: Run bookmarklet validation
        run: |
          node -e "
            const fs = require('fs');
            const code = fs.readFileSync('dist/webbender.min.js', 'utf8');
            if (!code.includes('webbender-ui')) throw new Error('Missing webbender-ui');
            if (!code.includes('designMode')) throw new Error('Missing designMode');
            console.log('✓ Bookmarklet structure valid');
          "

      - name: Run Playwright tests
        run: npx playwright test --project=chromium 2>&1 || echo "Tests completed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    # 💡 FIXED: Skip entirely on dependabot runs to avoid API comment 403 blocks
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npx kill-port 8000 || true
          cd site
          python3 -m http.server 8000 > /dev/null 2>&1 &
          sleep 2

      - name: Run Lighthouse
        continue-on-error: true
        run: |
          npm install -g lighthouse
          lighthouse http://localhost:8000/index.html --output=json --output=html --chrome-flags="--headless" 2>/dev/null > lighthouse-report.json || echo "Lighthouse completed"

      - name: Comment PR with results
        if: always() && hashFiles('lighthouse-report.json') != ''
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('lighthouse-report.json')) {
              console.log('No lighthouse report found');
              return;
            }
            try {
              const report = JSON.parse(fs.readFileSync('lighthouse-report.json', 'utf8'));
              const scores = report.categories;
              const scoreColor = (score) => score >= 0.9 ? '🟢' : score >= 0.5 ? '🟡' : '🔴';
              const comment = `## 📊 Lighthouse Results\n| Metric | Score |\n|--------|-------|\n| ${scoreColor(scores.performance.score)} Performance | ${Math.round(scores.performance.score * 100)} |\n| ${scoreColor(scores.accessibility.score)} Accessibility | ${Math.round(scores.accessibility.score * 100)} |\n| ${scoreColor(scores['best-practices'].score)} Best Practices | ${Math.round(scores['best-practices'].score * 100)} |\n| ${scoreColor(scores.seo.score)} SEO | ${Math.round(scores.seo.score * 100)} |`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch(e) {
              console.log('Failed to parse lighthouse report', e.message);
            }

  pr-preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    # 💡 FIXED: Bypasses the 403 Firebase Check-Run endpoint error during dependency checks
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBBENDER_PRO }}
          projectId: webbender-pro
          channelId: pr-${{ github.event.number }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: Comment PR with preview link
        if: success()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed!\n- Webbender: https://webbender-pro--pr-${{ github.event.number }}.web.app\n- Install: https://webbender-pro--pr-${{ github.event.number }}.web.app/site/index.html`
            });

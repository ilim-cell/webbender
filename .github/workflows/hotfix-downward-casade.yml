name: Immediate Hotfix Cascade

on:
  push:
    branches:
      - main

jobs:
  cascade-hotfix:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'hotfix') || contains(github.event.head_commit.message, 'v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BYPASS_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cascade to beta
        run: |
          # Fetch explicitly so Git absolutely knows about origin/beta
          git fetch origin beta || true
          
          # Force create/reset local beta branch to match origin/beta, or create fresh if it doesn't exist
          git checkout -B beta origin/beta || git checkout -b beta
          
          # 💡 ATOMIC RETRY LOOP
          for i in {1..5}; do
            git fetch origin beta
            git reset --hard origin/beta
            if git merge origin/main --no-ff -X ours -m "chore: immediate hotfix cascade to beta [skip ci]"; then
              if git push origin beta; then
                echo "✓ Successfully pushed to beta!"
                break
              fi
            fi
            
            BACKOFF=$((2**i))
            echo "⚠️ Remote changed mid-flight. Backing off for ${BACKOFF}s and retrying ($i/5)..."
            sleep $BACKOFF
          done

      - name: Cascade to dev
        run: |
          # Fetch explicitly so Git absolutely knows about origin/dev
          git fetch origin dev || true
          
          # Force create/reset local dev branch to match origin/dev, or create fresh if it doesn't exist
          git checkout -B dev origin/dev || git checkout -b dev
          
          # 💡 ATOMIC RETRY LOOP
          for i in {1..5}; do
            git fetch origin dev
            git reset --hard origin/dev
            if git merge origin/beta --no-ff -X ours -m "chore: immediate hotfix cascade to dev [skip ci]"; then
              if git push origin dev; then
                echo "✓ Successfully pushed to dev!"
                break
              fi
            fi
            
            BACKOFF=$((2**i))
            echo "⚠️ Remote changed mid-flight. Backing off for ${BACKOFF}s and retrying ($i/5)..."
            sleep $BACKOFF
          done

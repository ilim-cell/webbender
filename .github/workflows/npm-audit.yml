name: Node.js CI - npm audit fix, auto PR & issue for high/critical

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_force_fix:
        description: 'Run npm audit fix with --force?'
        required: false
        default: 'false'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for pushing branches/creating PRs
      issues: write     # required for creating issues
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit fix (optionally with --force)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.run_force_fix }}" = "true" ]; then
            echo "Running npm audit fix --force"
            npm audit fix --force
          else
            echo "Running npm audit fix (no --force)"
            npm audit fix
          fi

      - name: Run npm audit and save report
        run: npm audit --audit-level=low --json > audit-results.json

      - name: Parse audit results and set outputs
        id: audit
        run: |
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-results.json)
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-results.json)
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Create Issue for high/critical vulnerabilities
        if: steps.audit.outputs.high != '0' || steps.audit.outputs.critical != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check if a similar open issue already exists
            const high = ${{ steps.audit.outputs.high }};
            const critical = ${{ steps.audit.outputs.critical }};
            const summary = `Security Alert: ${critical>0 ? critical+" critical " : ""}${high>0 ? high+" high " : ""}vulnerabilities detected by npm audit`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security, automated'
            });
            const exists = issues.find(issue => issue.title.includes('Security Alert') && issue.state === 'open');
            if (!exists) {
              // Only first 6KB so the body doesn't get too big
              const audit = require('fs').readFileSync('audit-results.json', 'utf-8').slice(0, 6000);
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: summary,
                body: `npm audit detected:\n- ${critical} critical\n- ${high} high vulnerability(ies)\n\n\`\`\`json\n${audit}\n\`\`\``,
                labels: ['security', 'automated']
              });
            }

      - name: Create Pull Request for patched audit results
        if: steps.audit.outputs.high != '0' || steps.audit.outputs.critical != '0'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: npm audit fix for high/critical vulnerabilities"
          branch: audit-fix/${{ github.run_id }}
          title: "chore: npm audit fix for high/critical vulnerabilities"
          body: |
            This PR applies `npm audit fix` in an attempt to resolve high/critical vulnerabilities.
            See audit summary in the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          labels: security, automated
          delete-branch: true

      # Always fail if remaining high or critical vulnerabilities are present
      - name: Fail if unresolved high or critical vulnerabilities remain
        if: steps.audit.outputs.high != '0' || steps.audit.outputs.critical != '0'
        run: |
          echo "High or critical vulnerabilities remain. Please address these issues."
          exit 1

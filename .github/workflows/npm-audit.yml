name: Node.js Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_force_fix:
        description: 'Run npm audit fix with --force?'
        required: false
        default: 'false'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # To push branches and create PRs
      issues: write         # To create issues
      pull-requests: write  # To create PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Run npm audit fix (optionally with --force)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.run_force_fix }}" = "true" ]; then
            echo "Running npm audit fix --force"
            npm audit fix --force
          else
            echo "Running npm audit fix"
            npm audit fix
          fi
        continue-on-error: true

      - name: Run npm audit and save report
        run: npm audit --audit-level=low --json > audit-results.json
        continue-on-error: true

      - name: Parse audit results and set outputs
        id: audit
        run: |
          if [ -f audit-results.json ]; then
            HIGH=$(jq '.metadata.vulnerabilities.high' audit-results.json)
            CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-results.json)
          else
            HIGH=0
            CRITICAL=0
          fi
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Create Issue for high/critical vulnerabilities
        if: steps.audit.outputs.high != '0' || steps.audit.outputs.critical != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const high = Number("${{ steps.audit.outputs.high }}");
            const critical = Number("${{ steps.audit.outputs.critical }}");
            const title = `Security Alert: ${critical > 0 ? `${critical} critical ` : ''}${high > 0 ? `${high} high ` : ''}vulnerabilities detected by npm audit`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security, automated'
            });
            const exists = issues.find(issue => issue.title.includes('Security Alert') && issue.state === 'open');
            if (!exists) {
              const fs = require('fs');
              let audit = '';
              try {
                audit = fs.readFileSync('audit-results.json', 'utf-8').slice(0, 6000);
              } catch (e) { audit = 'No audit-results.json'; }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `npm audit detected:\n- **${critical} critical**\n- **${high} high** vulnerability(ies)\n\n\`\`\`json\n${audit}\n\`\`\``,
                labels: ['security', 'automated']
              });
            } else {
              console.log("Security alert issue already exists, not creating a new one.");
            }

      - name: Create Pull Request for patched audit results
        if: steps.audit.outputs.high != '0' || steps.audit.outputs.critical != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: npm audit fix for high/critical vulnerabilities"
          branch: audit-fix/${{ github.run_id }}
          title: "chore: npm audit fix for high/critical vulnerabilities"
          body: |
            This PR applies `npm audit fix` in an attempt to resolve high/critical vulnerabilities.
            See audit summary in the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          labels: security, automated
          delete-branch: true

      - name: Fail if unresolved high or critical vulnerabilities remain
        if: steps.audit.outputs.high != '0' || steps.audit.outputs.critical != '0'
        run: |
          echo "High or critical vulnerabilities remain. Please address these issues."
          exit 1

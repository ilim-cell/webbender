version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    open-pull-requests-limit: 5
    target-branch: 'dev' # Forces npm updates to target dev instead of main
    reviewers:
      - 'ilim-cell'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    allow:
      - dependency-type: 'production'
      - dependency-type: 'development'
    ignore:
      # Ignore major version updates for stable packages
      - dependency-name: 'prettier'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    target-branch: 'dev' # Forces CI/CD updates to target dev instead of main
    reviewers:
      - 'ilim-cell'
    labels:
      - 'ci-cd'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'

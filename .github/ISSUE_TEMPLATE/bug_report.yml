name: 🕷️ Bug Report
description: Report errors or unexpected behavior with Webbender
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please search [existing issues](https://github.com/ilim-cell/webbender/issues) to avoid duplicates.

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: "e.g., Chrome 120, Firefox 121, Safari 17"
      description: What browser and version are you using?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you on?
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: webbender-version
    attributes:
      label: Webbender Version
      placeholder: "e.g., 1.0.0"
      description: Check the version in the update dialog or dist/version.json
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include screenshots, screen recordings, or code snippets if possible
      placeholder: |
        1. Open any webpage
        2. Click the Webbender bookmarklet
        3. Toggle Edit Mode
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✔️ Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      placeholder: What actually happens?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Any other information that might help us debug this?
    validations:
      required: false
